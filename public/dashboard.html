<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KosmoQuestt Gallery</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- FAVICON START -->

<link rel="icon" href="/favicon.ico?v=2">

<!-- FAVICON END -->

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
:root{
    --bg:#050814;
    --text:white;
    --header-bg:rgba(0,0,0,.6);
    --card-bg:rgba(15,23,42,.85);
    --border:rgba(255,255,255,.08);
    --input-bg:#111827;
}

.light-theme{
    --bg:#f5f7ff;
    --text:#111827;
    --header-bg:rgba(255,255,255,.9);
    --card-bg:#ffffff;
    --border:rgba(0,0,0,.08);
    --input-bg:#e5e7eb;
}

body{
    font-family:Segoe UI,sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
    transition:.3s;
}

/* Moving Stars */

.stars{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:starMove linear infinite;
}

@keyframes starMove{
    0%{
        transform:translateY(0);
        opacity:.2;
    }

    50%{
        opacity:1;
    }

    100%{
        transform:translateY(-150px);
        opacity:.2;
    }
}

.content{
    position:relative;
    z-index:1;
}

/* Header */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 40px;
    background:var(--header-bg);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    color:white;
}

.logo img{
    height:45px;
    width:auto;
    display:block;
}

.nav-links{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.nav-links a{
    color:#cbd5e1;
    text-decoration:none;
    padding:10px 16px;
    border-radius:10px;
    margin:0;
}

.nav-links a:hover{
    background:rgba(255,255,255,.08);
}

.nav-links a:hover{
    color:white;
}

/* Profile */

#profile{
    text-align:center;
    margin-top:25px;
}

.profile-image{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #2563eb;
}

.profile-email{
    color:#94a3b8;
}

/* Upload */

.upload-box{
    max-width:600px;
    margin:25px auto;
    padding:25px;
    border-radius:18px;
    background:var(--card-bg);
    border:1px solid var(--border);
}

.upload-box h3{
    text-align:center;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:var(--input-bg);
    color:white;
}

input::placeholder{
    color:#6b7280;
}

button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* Gallery */

.section-title{
    text-align:center;
    margin-top:30px;
    margin-bottom:15px;
}

.gallery{
    max-width:1400px;
    margin:auto;
    padding:20px;

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(320px,320px));

    justify-content:center;

    gap:20px;
}

.card{
    background:var(--card-bg);
    border-radius:15px;
    overflow:hidden;
    border:1px solid var(--border);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(37,99,235,.3);
}

.card img{
    width:100%;
    height:240px;
    object-fit:cover;
    display:block;
}

.caption{
    padding:12px;
    color:#d1d5db;
}

/* Like and Comment Section */

.engagement-section{
    padding:12px;
    border-top:1px solid var(--border);
}

.like-section{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:12px;
}

.like-btn{
    background:none;
    border:none;
    color:#60a5fa;
    font-size:20px;
    cursor:pointer;
    padding:8px;
    transition:.2s;
    width:auto;
    margin:0;
}

.like-btn:hover{
    color:#3b82f6;
    transform:scale(1.1);
}

.like-btn.liked{
    color:#ef4444;
}

.like-count{
    color:#94a3b8;
    font-size:14px;
}

/* Comment Input - YouTube Style */

.comment-form{
    display:none;
    gap:12px;
    margin-bottom:20px;
    align-items:flex-start;
}

.engagement-section:hover .comment-form{
    display:flex;
}

.comment-form.active{
    display:flex !important;
}

.comment-form-avatar{
    width:36px !important;
    height:36px !important;
    min-width:36px !important;
    min-height:36px !important;
    border-radius:50%;
    object-fit:cover;
    flex-shrink:0 !important;
    display:block;
}

.comment-input-wrapper{
    flex:1;
    display:flex;
    flex-direction:column;
}

.comment-input{
    width:100% !important;
    padding:10px 12px !important;
    border:1px solid var(--border) !important;
    border-radius:6px !important;
    background:var(--input-bg) !important;
    color:white !important;
    font-size:13px !important;
    margin:0 !important;
    min-height:36px !important;
    max-height:36px !important;
}

.comment-submit{
    width:auto;
    padding:8px 18px;
    margin:0;
    font-size:13px;
    margin-top:8px;
}

/* Comments List - YouTube Style */

.comments-list{
    max-height:400px;
    overflow-y:auto;
}

.comment{
    display:flex;
    gap:12px;
    padding:15px 0;
    border-top:1px solid var(--border);
}

.comment:first-child{
    border-top:none;
}

.comment-avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
    flex-shrink:0;
}

.comment-content{
    flex:1;
}

.comment-header{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:4px;
}

.comment-name{
    color:#60a5fa;
    font-weight:600;
    font-size:13px;
}

.comment-time{
    color:#6b7280;
    font-size:12px;
}

.comment-text{
    color:#d1d5db;
    margin:6px 0 8px 0;
    font-size:13px;
    line-height:1.5;
}

.comment-actions{
    display:flex;
    gap:12px;
}

.comment-delete{
    background:none;
    border:none;
    color:#ef4444;
    cursor:pointer;
    font-size:12px;
    padding:0;
    width:auto;
    font-weight:500;
    transition:.2s;
}

.comment-delete:hover{
    color:#dc2626;
    text-decoration:underline;
}

.delete-btn{
    width:90%;
    margin:12px auto 15px;
    display:block;
    background:#dc2626;
    color:white;
    border:none;
    border-radius:10px;
    padding:10px;
    cursor:pointer;
    font-weight:bold;
}

.delete-btn:hover{
    background:#b91c1c;
}

.loading{
    text-align:center;
    margin:25px;
    color:#94a3b8;
}

.image-counter{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:#60a5fa;
    margin-bottom:20px;
}

#themeToggle{
    background:rgba(255,255,255,.08);
    border:none;
    color:white;
    font-size:18px;
    cursor:pointer;
    width:auto;
    padding:10px 16px;
    border-radius:10px;
    margin:0;
    transition:.3s;
}

#themeToggle:hover{
    background:rgba(255,255,255,.15);
}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<div class="content">

<header class="header">

<a href="/" class="logo">
    <img src="/logo_1.png" alt="Logo">
    <h2>KosmoQuestt</h2>
</a>

<div class="nav-links">
    <button id="themeToggle">🌙</button>
    <a href="/">Home</a>
    <a href="/logout">Logout</a>
</div>

</header>

<div id="profile"></div>

<div class="upload-box">

<h3>Upload Cosmic Image</h3>

<form action="/upload" method="POST" enctype="multipart/form-data">

<input
type="file"
name="image"
accept="image/*"
required>

<input
type="text"
name="caption"
placeholder="Enter image caption">

<button type="submit">
Upload Image
</button>

</form>

</div>

<h2 class="section-title">
Latest Space Uploads
</h2>

<div id="imageCounter" class="image-counter">
    🚀 Total Images Uploaded: Loading...
</div>

<div id="gallery" class="gallery"></div>

<div id="loading" class="loading">
Loading images...
</div>

</div>

<script>

const stars = document.getElementById("stars");

for(let i=0;i<220;i++){

    const star = document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "vw";

    star.style.top =
    Math.random()*100 + "vh";

    star.style.opacity =
    Math.random();

    star.style.animationDuration =
    (Math.random()*12 + 5) + "s";

    stars.appendChild(star);
}

</script>

<script>

fetch("/user")
.then(res => res.json())
.then(user => {

    if(!user) return;

    document.getElementById("profile").innerHTML = `

    <img
    class="profile-image"
    src="${user.photo}?sz=200"
    alt="Profile"
    referrerpolicy="no-referrer"
    onerror="this.src='/logo_1.png'">

    <h3 style="margin-top:12px;">
        ${user.displayName}
    </h3>

    <p class="profile-email">
        ${user.email}
    </p>

    `;
    
    // Set user avatar in comment forms (loaded after gallery)
    setTimeout(() => {
        document.querySelectorAll('[id^="your-avatar-"]').forEach(avatar => {
            avatar.src = `${user.photo}?sz=36`;
        });
    }, 500);
});

</script>

<script>

fetch("/images")
.then(res => res.json())
.then(images => {

    const gallery =
    document.getElementById("gallery");

    const loading =
    document.getElementById("loading");

    loading.style.display = "none";

    if(images.length === 0){

        loading.style.display = "block";

        loading.innerText =
        "No images uploaded yet";

        return;
    }

    images.forEach(img => {

        const card =
        document.createElement("div");

        card.className = "card";

        card.innerHTML = `

        <img src="${img.imageUrl}">

        <div class="caption">
        ${img.caption || "No caption"}
        </div>

        <div class="engagement-section">
        
            <div class="like-section">
                <button class="like-btn" onclick="toggleLike('${img._id}', event)">
                    ♡
                </button>
                <span class="like-count" id="like-count-${img._id}">Loading...</span>
            </div>

            <div class="comment-form" id="comment-form-${img._id}">
                <img class="comment-form-avatar" src="" alt="Your avatar" id="your-avatar-${img._id}" onerror="this.src='/logo_1.png'">
                <div class="comment-input-wrapper">
                    <input 
                        type="text" 
                        class="comment-input" 
                        placeholder="Add a comment..." 
                        id="comment-input-${img._id}"
                    >
                    <button 
                        class="comment-submit" 
                        onclick="addComment('${img._id}')">
                        Post
                    </button>
                </div>
            </div>

            <div class="comments-list" id="comments-${img._id}">
                Loading comments...
            </div>

        </div>

        <button
        class="delete-btn"
        onclick="deleteImage('${img._id}')">
        🗑 Delete
        </button>

        `;

        gallery.appendChild(card);

        // Load likes and comments
        loadLikes(img._id);
        loadComments(img._id);

    });

})
.catch(() => {

    document.getElementById("loading")
    .innerText = "Failed to load images";

});

</script>

<script>

async function toggleLike(imageId, event) {
    try {
        const response = await fetch(`/api/images/${imageId}/like`, {
            method: "POST"
        });

        if (!response.ok) {
            alert("Please login to like");
            return;
        }

        const data = await response.json();

        // Update button state
        const btn = event.target;
        if (data.liked) {
            btn.classList.add("liked");
            btn.textContent = "❤";
        } else {
            btn.classList.remove("liked");
            btn.textContent = "♡";
        }

        // Update count
        document.getElementById(`like-count-${imageId}`).textContent = 
            `${data.likeCount} ${data.likeCount === 1 ? "like" : "likes"}`;

    } catch (err) {
        console.log(err);
        alert("Error liking image");
    }
}

async function loadLikes(imageId) {
    try {
        const response = await fetch(`/api/images/${imageId}/likes`);
        const data = await response.json();

        document.getElementById(`like-count-${imageId}`).textContent = 
            `${data.likeCount} ${data.likeCount === 1 ? "like" : "likes"}`;

        // Update button state if user liked it
        if (data.userLiked) {
            const btn = document.querySelector(`[onclick="toggleLike('${imageId}', event)"]`);
            if (btn) {
                btn.classList.add("liked");
                btn.textContent = "❤";
            }
        }
    } catch (err) {
        console.log(err);
    }
}

async function addComment(imageId) {
    const input = document.getElementById(`comment-input-${imageId}`);
    const commentText = input.value.trim();

    if (!commentText) {
        alert("Comment cannot be empty");
        return;
    }

    try {
        const response = await fetch(`/api/images/${imageId}/comment`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ commentText })
        });

        if (!response.ok) {
            if (response.status === 401) {
                alert("Please login to comment");
            } else {
                alert("Error posting comment");
            }
            return;
        }

        input.value = "";
        loadComments(imageId);

    } catch (err) {
        console.log(err);
        alert("Error posting comment");
    }
}

// Show comment form on input focus
document.addEventListener('focus', function(e) {
    if (e.target.classList.contains('comment-input')) {
        const form = e.target.closest('.comment-form');
        if (form) {
            form.classList.add('active');
        }
    }
}, true);

async function loadComments(imageId) {
    try {
        const response = await fetch(`/api/images/${imageId}/comments`);
        const comments = await response.json();

        const commentsList = document.getElementById(`comments-${imageId}`);
        commentsList.innerHTML = "";

        if (comments.length === 0) {
            commentsList.innerHTML = "<p style='color:#6b7280;font-size:13px;padding:10px 0;'>No comments yet</p>";
            return;
        }

        comments.forEach(comment => {
            const commentDiv = document.createElement("div");
            commentDiv.className = "comment";
            
            // Format time
            const commentTime = new Date(comment.createdAt);
            const timeText = getTimeAgo(commentTime);
            
            commentDiv.innerHTML = `
                <img class="comment-avatar" src="${comment.userPhoto}?sz=40" alt="avatar" onerror="this.src='/logo_1.png'">
                <div class="comment-content">
                    <div class="comment-header">
                        <span class="comment-name">${comment.userName}</span>
                        <span class="comment-time">${timeText}</span>
                    </div>
                    <div class="comment-text">${comment.commentText}</div>
                    <div class="comment-actions">
                        <button class="comment-delete" onclick="deleteComment('${imageId}', '${comment._id}')">
                            Delete
                        </button>
                    </div>
                </div>
            `;
            commentsList.appendChild(commentDiv);
        });

    } catch (err) {
        console.log(err);
    }
}

function getTimeAgo(date) {
    const now = new Date();
    const diff = now - date;
    const seconds = Math.floor(diff / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);
    
    if (seconds < 60) return "just now";
    if (minutes < 60) return `${minutes}m ago`;
    if (hours < 24) return `${hours}h ago`;
    if (days < 7) return `${days}d ago`;
    return date.toLocaleDateString();
}

async function deleteComment(imageId, commentId) {
    if (!confirm("Delete this comment?")) {
        return;
    }

    try {
        const response = await fetch(`/api/images/${imageId}/comment/${commentId}`, {
            method: "DELETE"
        });

        if (response.ok) {
            loadComments(imageId);
        } else {
            alert("Error deleting comment");
        }
    } catch (err) {
        console.log(err);
        alert("Error deleting comment");
    }
}

</script>

<script>
async function deleteImage(id) {

    if (!confirm("Delete this image?")) {
        return;
    }

    try {

        const response = await fetch(
            `/images/${id}`,
            {
                method: "DELETE"
            }
        );

        const data = await response.json();

        if (data.success) {

            alert("Image deleted");

            location.reload();

        } else {

            alert(data.message || "Delete failed");
        }

    } catch (err) {

        console.log(err);

        alert("Error deleting image");
    }
}
</script>

<script>
const toggleBtn = document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="light"){
    document.body.classList.add("light-theme");
    toggleBtn.textContent="☀️";
}

toggleBtn.addEventListener("click",()=>{

    document.body.classList.toggle("light-theme");

    if(document.body.classList.contains("light-theme")){
        localStorage.setItem("theme","light");
        toggleBtn.textContent="☀️";
    }else{
        localStorage.setItem("theme","dark");
        toggleBtn.textContent="🌙";
    }

});
</script>

<script>

fetch("/image-count")
.then(res => res.json())
.then(data => {

    document.getElementById("imageCounter").innerHTML =
        `🚀 Total Images Uploaded: ${data.count}`;

})
.catch(() => {

    document.getElementById("imageCounter").innerHTML =
        "🚀 Total Images Uploaded: 0";

});

</script>
</body>
</html>
