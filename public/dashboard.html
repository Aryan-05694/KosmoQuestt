<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KosmoQuestt Gallery</title>

<!-- FAVICON START -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" href="/favicon.ico?v=2">

<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<link rel="manifest" href="/site.webmanifest">
<!-- FAVICON END -->

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
:root{
    --bg:#050814;
    --text:white;
    --header-bg:rgba(0,0,0,.6);
    --card-bg:rgba(15,23,42,.85);
    --border:rgba(255,255,255,.08);
    --input-bg:#111827;
}

.light-theme{
    --bg:#f5f7ff;
    --text:#111827;
    --header-bg:rgba(255,255,255,.9);
    --card-bg:#ffffff;
    --border:rgba(0,0,0,.08);
    --input-bg:#e5e7eb;
}

body{
    font-family:Segoe UI,sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
    transition:.3s;
}

/* Moving Stars */

.stars{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:starMove linear infinite;
}

@keyframes starMove{
    0%{
        transform:translateY(0);
        opacity:.2;
    }

    50%{
        opacity:1;
    }

    100%{
        transform:translateY(-150px);
        opacity:.2;
    }
}

.content{
    position:relative;
    z-index:1;
}

/* Header */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 40px;
    background:var(--header-bg);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    color:white;
}

.logo img{
    height:45px;
    width:auto;
    display:block;
}

.nav-links{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.nav-links a{
    color:#cbd5e1;
    text-decoration:none;
    padding:10px 16px;
    border-radius:10px;
    margin:0;
}

.nav-links a:hover{
    background:rgba(255,255,255,.08);
}

.nav-links a:hover{
    color:white;
}

/* Profile */

#profile{
    text-align:center;
    margin-top:25px;
}

.profile-image{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #2563eb;
}

.profile-email{
    color:#94a3b8;
}

/* Upload */

.upload-box{
    max-width:600px;
    margin:25px auto;
    padding:25px;
    border-radius:18px;
    background:var(--card-bg);
    border:1px solid var(--border);
}

.upload-box h3{
    text-align:center;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:var(--input-bg);
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* Gallery */

.section-title{
    text-align:center;
    margin-top:30px;
    margin-bottom:15px;
}

.gallery{
    max-width:1400px;
    margin:auto;
    padding:20px;

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(320px,320px));

    justify-content:center;

    gap:20px;
}

.card{
    background:var(--card-bg);
    border-radius:15px;
    overflow:hidden;
    border:1px solid var(--border);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(37,99,235,.3);
}

.card img{
    width:100%;
    height:240px;
    object-fit:cover;
    display:block;
}

.caption{
    padding:12px;
    color:#d1d5db;
}

.loading{
    text-align:center;
    margin:25px;
    color:#94a3b8;
}

#themeToggle{
    background:rgba(255,255,255,.08);
    border:none;
    color:white;
    font-size:18px;
    cursor:pointer;
    width:auto;
    padding:10px 16px;
    border-radius:10px;
    margin:0;
    transition:.3s;
}

#themeToggle:hover{
    background:rgba(255,255,255,.15);
}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<div class="content">

<header class="header">

<a href="/" class="logo">
    <img src="/logo_1.png" alt="Logo">
    <h2>KosmoQuestt</h2>
</a>

<div class="nav-links">
    <button id="themeToggle">🌙</button>
    <a href="/">Home</a>
    <a href="/logout">Logout</a>
</div>

</header>

<div id="profile"></div>

<div class="upload-box">

<h3>Upload Cosmic Image</h3>

<form action="/upload" method="POST" enctype="multipart/form-data">

<input
type="file"
name="image"
accept="image/*"
required>

<input
type="text"
name="caption"
placeholder="Enter image caption">

<button type="submit">
Upload Image
</button>

</form>

</div>

<h2 class="section-title">
Latest Space Uploads
</h2>

<div id="gallery" class="gallery"></div>

<div id="loading" class="loading">
Loading images...
</div>

</div>

<script>

const stars = document.getElementById("stars");

for(let i=0;i<220;i++){

    const star = document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "vw";

    star.style.top =
    Math.random()*100 + "vh";

    star.style.opacity =
    Math.random();

    star.style.animationDuration =
    (Math.random()*12 + 5) + "s";

    stars.appendChild(star);
}

</script>

<script>

fetch("/user")
.then(res => res.json())
.then(user => {

    if(!user) return;

    document.getElementById("profile").innerHTML = `

    <img
    class="profile-image"
    src="${user.photo}?sz=200"
    alt="Profile"
    referrerpolicy="no-referrer"
    onerror="this.src='/logo_1.png'">

    <h3 style="margin-top:12px;">
        ${user.displayName}
    </h3>

    <p class="profile-email">
        ${user.email}
    </p>

    `;
});

</script>

<script>

fetch("/images")
.then(res => res.json())
.then(images => {

    const gallery =
    document.getElementById("gallery");

    const loading =
    document.getElementById("loading");

    loading.style.display = "none";

    if(images.length === 0){

        loading.style.display = "block";

        loading.innerText =
        "No images uploaded yet";

        return;
    }

    images.forEach(img => {

        const card =
        document.createElement("div");

        card.className = "card";

        card.innerHTML = `

        <img src="/uploads/${img.filename}">

        <div class="caption">
        ${img.caption || "No caption"}
        </div>

        `;

        gallery.appendChild(card);

    });

})
.catch(() => {

    document.getElementById("loading")
    .innerText = "Failed to load images";

});

</script>

<script>
const toggleBtn = document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="light"){
    document.body.classList.add("light-theme");
    toggleBtn.textContent="☀️";
}

toggleBtn.addEventListener("click",()=>{

    document.body.classList.toggle("light-theme");

    if(document.body.classList.contains("light-theme")){
        localStorage.setItem("theme","light");
        toggleBtn.textContent="☀️";
    }else{
        localStorage.setItem("theme","dark");
        toggleBtn.textContent="🌙";
    }

});
</script>

</body>
</html>
