<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KosmoQuestt Gallery</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="icon" href="/favicon.ico?v=2">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

:root{
    --bg:#050814;
    --text:white;
    --header-bg:rgba(0,0,0,.6);
    --sidebar-bg:rgba(15,23,42,.85);
    --card-bg:rgba(15,23,42,.85);
    --border:rgba(255,255,255,.08);
    --input-bg:#111827;
    --modal-bg:rgba(5,8,20,.98);
}

.light-theme{
    --bg:#f5f7ff;
    --text:#111827;
    --header-bg:rgba(255,255,255,.95);
    --sidebar-bg:#ffffff;
    --card-bg:#ffffff;
    --border:rgba(0,0,0,.08);
    --input-bg:#e5e7eb;
    --modal-bg:rgba(255,255,255,.98);
}

body{
    font-family:Segoe UI,sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
    transition:.3s;
}

/* STARS */
.stars{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:starMove linear infinite;
}

@keyframes starMove{
    0%{ transform:translateY(0); opacity:.2; }
    50%{ opacity:1; }
    100%{ transform:translateY(-150px); opacity:.2; }
}

.main-wrapper{
    position:relative;
    z-index:1;
    display:flex;
    height:100vh;
    flex-direction:column;
}

/* ===== HEADER ===== */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 40px;
    background:var(--header-bg);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    z-index:50;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    color:var(--text);
}

.logo img{
    height:40px;
    width:auto;
}

.logo h2{
    font-size:20px;
}

.header-right{
    display:flex;
    align-items:center;
    gap:16px;
}

#themeToggle{
    background:rgba(255,255,255,.08);
    border:none;
    color:var(--text);
    font-size:18px;
    cursor:pointer;
    padding:8px 12px;
    border-radius:8px;
    transition:.3s;
}

#themeToggle:hover{ background:rgba(255,255,255,.15); }

/* ===== LAYOUT ===== */
.content-wrapper{
    display:flex;
    flex:1;
    overflow:hidden;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:280px;
    background:var(--sidebar-bg);
    border-right:1px solid var(--border);
    overflow-y:auto;
    padding:20px;
    flex-shrink:0;
}

.sidebar::-webkit-scrollbar{ width:6px; }
.sidebar::-webkit-scrollbar-track{ background:transparent; }
.sidebar::-webkit-scrollbar-thumb{ background:rgba(96,165,250,.3); border-radius:3px; }

/* PROFILE CARD */
.profile-card{
    text-align:center;
    padding:20px;
    background:rgba(37,99,235,.1);
    border:1px solid rgba(37,99,235,.2);
    border-radius:12px;
    margin-bottom:24px;
}

.profile-image{
    width:80px;
    height:80px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #2563eb;
    margin:0 auto 12px;
}

.profile-name{
    font-size:16px;
    font-weight:700;
    margin-bottom:4px;
}

.profile-email{
    color:#94a3b8;
    font-size:12px;
    word-break:break-all;
}

/* SIDEBAR SECTIONS */
.sidebar-section{
    margin-bottom:24px;
}

.sidebar-title{
    font-size:11px;
    font-weight:700;
    letter-spacing:.1em;
    color:#60a5fa;
    text-transform:uppercase;
    margin-bottom:12px;
    padding:0 8px;
}

.sidebar-links{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.sidebar-link{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    color:#cbd5e1;
    text-decoration:none;
    border-radius:8px;
    transition:.2s;
    font-size:14px;
}

.sidebar-link:hover{
    background:rgba(255,255,255,.08);
    color:white;
}

.sidebar-link i{
    width:20px;
    text-align:center;
}

.logout-btn{
    width:100%;
    padding:10px 12px;
    background:#dc2626;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:.2s;
    margin-top:12px;
}

.logout-btn:hover{ background:#b91c1c; }

/* ===== MAIN CONTENT ===== */
.main-content{
    flex:1;
    overflow-y:auto;
    padding:20px 40px;
}

.main-content::-webkit-scrollbar{ width:8px; }
.main-content::-webkit-scrollbar-track{ background:transparent; }
.main-content::-webkit-scrollbar-thumb{ background:rgba(96,165,250,.3); border-radius:4px; }

.content-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:24px;
}

.content-header h2{
    font-size:28px;
    font-weight:700;
}

.stats-bar{
    display:flex;
    gap:20px;
    margin-bottom:32px;
    padding:16px;
    background:rgba(37,99,235,.1);
    border:1px solid rgba(37,99,235,.2);
    border-radius:12px;
}

.stat-item{
    flex:1;
    text-align:center;
}

.stat-number{
    font-size:24px;
    font-weight:700;
    color:#60a5fa;
}

.stat-label{
    font-size:12px;
    color:#94a3b8;
    margin-top:4px;
}

/* ===== GALLERY ===== */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
    margin-bottom:40px;
}

.card{
    background:var(--card-bg);
    border-radius:12px;
    overflow:hidden;
    border:1px solid var(--border);
    transition:.3s;
    display:flex;
    flex-direction:column;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(37,99,235,.3);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    display:block;
}

.card-body{
    padding:12px;
    flex:1;
    display:flex;
    flex-direction:column;
}

.caption{
    color:#d1d5db;
    font-size:13px;
    line-height:1.5;
    margin-bottom:12px;
    flex:1;
}

/* ENGAGEMENT */
.engagement-section{
    padding-top:12px;
    border-top:1px solid var(--border);
    display:flex;
    align-items:center;
    gap:8px;
    justify-content:space-between;
}

.engagement-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.like-section{
    display:flex;
    align-items:center;
    gap:6px;
}

.like-btn{
    background:none;
    border:none;
    color:#60a5fa;
    font-size:18px;
    cursor:pointer;
    padding:4px;
    transition:.2s;
    width:auto;
    margin:0;
}

.like-btn:hover{ transform:scale(1.15); }

.like-btn.liked{ color:#ef4444; }

.like-count{
    color:#94a3b8;
    font-size:12px;
}

.comments-btn{
    background:none;
    border:none;
    color:#60a5fa;
    cursor:pointer;
    padding:4px 8px;
    font-size:12px;
    border-radius:4px;
    transition:.2s;
    width:auto;
    margin:0;
    display:flex;
    align-items:center;
    gap:4px;
}

.comments-btn:hover{
    background:rgba(96,165,250,.1);
    color:#3b82f6;
}

.comment-badge{
    background:rgba(96,165,250,.2);
    padding:2px 6px;
    border-radius:10px;
    font-size:11px;
    color:#60a5fa;
}

.delete-btn{
    width:auto;
    margin:0;
    background:#dc2626;
    color:white;
    border:none;
    border-radius:6px;
    padding:6px 12px;
    cursor:pointer;
    font-weight:600;
    font-size:12px;
    transition:.2s;
}

.delete-btn:hover{ background:#b91c1c; }

/* ===== FLOATING ACTION BUTTON ===== */
.fab{
    position:fixed;
    bottom:32px;
    right:32px;
    width:60px;
    height:60px;
    background:#2563eb;
    border:none;
    border-radius:50%;
    color:white;
    font-size:24px;
    cursor:pointer;
    box-shadow:0 4px 20px rgba(37,99,235,.5);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:40;
    transition:.3s;
}

.fab:hover{
    background:#1d4ed8;
    box-shadow:0 8px 30px rgba(37,99,235,.7);
    transform:scale(1.1);
}

/* ===== UPLOAD MODAL ===== */
.modal-overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:rgba(0,0,0,.7);
    backdrop-filter:blur(4px);
    z-index:1000;
    align-items:center;
    justify-content:center;
    animation:fadeIn .2s;
}

.modal-overlay.active{
    display:flex;
}

@keyframes fadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
}

.modal{
    background:var(--modal-bg);
    border-radius:16px;
    border:1px solid var(--border);
    width:90%;
    max-width:500px;
    display:flex;
    flex-direction:column;
    animation:slideUp .3s;
}

@keyframes slideUp{
    from{ transform:translateY(40px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
}

.modal-header{
    padding:24px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.modal-title{
    font-size:20px;
    font-weight:700;
}

.modal-close{
    background:none;
    border:none;
    color:var(--text);
    font-size:24px;
    cursor:pointer;
    width:40px;
    height:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:8px;
    transition:.2s;
    padding:0;
    margin:0;
}

.modal-close:hover{ background:rgba(255,255,255,.08); }

.modal-content{
    padding:24px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    font-size:13px;
    font-weight:600;
    margin-bottom:8px;
    color:var(--text);
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--input-bg);
    color:var(--text);
    font-size:14px;
}

.form-group input::placeholder{
    color:#6b7280;
}

.file-input-wrapper{
    position:relative;
    border:2px dashed rgba(37,99,235,.4);
    border-radius:8px;
    padding:32px 20px;
    text-align:center;
    cursor:pointer;
    transition:.2s;
    background:rgba(37,99,235,.05);
}

.file-input-wrapper:hover{
    border-color:rgba(37,99,235,.6);
    background:rgba(37,99,235,.1);
}

.file-input-wrapper input{
    display:none;
}

.file-input-label{
    cursor:pointer;
    display:block;
}

.file-input-icon{
    font-size:32px;
    margin-bottom:8px;
}

.file-input-text{
    font-size:13px;
    color:#94a3b8;
}

.upload-btn{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

.upload-btn:hover{ background:#1d4ed8; }

/* ===== COMMENTS MODAL ===== */
.comments-modal-overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:rgba(0,0,0,.7);
    backdrop-filter:blur(4px);
    z-index:1001;
    align-items:center;
    justify-content:center;
}

.comments-modal-overlay.active{
    display:flex;
}

.comments-modal{
    background:var(--modal-bg);
    border-radius:16px;
    border:1px solid var(--border);
    width:90%;
    max-width:540px;
    max-height:80vh;
    display:flex;
    flex-direction:column;
}

.comments-modal-header{
    padding:20px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.comments-modal-search{
    padding:12px 20px;
    display:flex;
    gap:8px;
}

.comments-modal-search input{
    flex:1;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--input-bg);
    color:white;
    font-size:13px;
}

.comments-list{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.comment{
    display:flex;
    gap:12px;
    padding:12px;
    background:rgba(255,255,255,.02);
    border-radius:8px;
    border:1px solid var(--border);
    margin-bottom:12px;
}

.comment-avatar{
    width:36px;
    height:36px;
    border-radius:50%;
    object-fit:cover;
    flex-shrink:0;
}

.comment-content{
    flex:1;
}

.comment-header{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:4px;
}

.comment-name{
    color:#60a5fa;
    font-weight:600;
    font-size:13px;
}

.comment-time{
    color:#6b7280;
    font-size:12px;
}

.comment-text{
    color:#d1d5db;
    font-size:13px;
    line-height:1.5;
    margin:8px 0;
}

.comment-actions{
    display:flex;
    gap:12px;
    font-size:12px;
    margin-top:8px;
}

.action-btn{
    background:none;
    border:none;
    color:#60a5fa;
    cursor:pointer;
    padding:0;
    width:auto;
    font-weight:500;
    transition:.2s;
}

.action-btn:hover{ color:#3b82f6; }

.action-btn.delete{
    color:#ef4444;
}

.action-btn.delete:hover{ color:#dc2626; }

.empty-comments{
    color:#6b7280;
    font-size:13px;
    text-align:center;
    padding:32px 20px;
}

.comments-modal-footer{
    padding:16px 20px;
    border-top:1px solid var(--border);
    display:flex;
    gap:8px;
}

.comments-input{
    flex:1;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--input-bg);
    color:white;
    font-size:13px;
}

.comments-submit{
    padding:10px 16px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    font-size:12px;
}

.comments-submit:hover{ background:#1d4ed8; }

.loading{
    text-align:center;
    padding:40px 20px;
    color:#94a3b8;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
    .sidebar{
        width:240px;
        padding:16px;
    }
    
    .main-content{
        padding:16px 20px;
    }
    
    .gallery{
        grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
        gap:16px;
    }
}

@media(max-width:768px){
    .content-wrapper{
        flex-direction:column;
    }
    
    .sidebar{
        width:100%;
        border-right:none;
        border-bottom:1px solid var(--border);
        max-height:120px;
        overflow-x:auto;
        display:flex;
        gap:20px;
        padding:12px 16px;
    }
    
    .sidebar-section{
        margin:0;
        flex-shrink:0;
    }
    
    .profile-card{
        margin:0;
        min-width:180px;
    }
    
    .main-content{
        padding:16px;
    }
    
    .gallery{
        grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
        gap:12px;
    }
    
    .card img{
        height:150px;
    }
    
    .fab{
        bottom:24px;
        right:24px;
        width:56px;
        height:56px;
        font-size:20px;
    }
    
    .stats-bar{
        flex-direction:column;
        gap:12px;
    }
    
    .header{
        padding:12px 16px;
    }
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="main-wrapper">

<!-- HEADER -->
<header class="header">
    <a href="/" class="logo">
        <img src="/logo_1.png" alt="Logo">
        <h2>KosmoQuestt</h2>
    </a>
    <div class="header-right">
        <button id="themeToggle">🌙</button>
    </div>
</header>

<!-- CONTENT LAYOUT -->
<div class="content-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="profile-card" id="profileCard">
            <div class="loading">Loading profile...</div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-title">Sections</div>
            <div class="sidebar-links">
                <a href="/" class="sidebar-link">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="/solar-system.html" class="sidebar-link">
                    <i class="fas fa-globe"></i> Solar System
                </a>
                <a href="/iss.html" class="sidebar-link">
                    <i class="fas fa-satellite"></i> ISS Tracker
                </a>
                <a href="/iss-3d.html" class="sidebar-link">
                    <i class="fas fa-cube"></i> ISS 3D
                </a>
                <a href="/about.html" class="sidebar-link">
                    <i class="fas fa-info-circle"></i> About
                </a>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-title">Community</div>
            <div class="sidebar-links">
                <a href="https://youtube.com/@KosmoQuestt" target="_blank" class="sidebar-link">
                    <i class="fab fa-youtube"></i> YouTube
                </a>
                <a href="https://x.com/KosmoQuestt" target="_blank" class="sidebar-link">
                    <i class="fab fa-x-twitter"></i> Twitter/X
                </a>
            </div>
        </div>

        <button class="logout-btn" onclick="document.location.href='/logout'">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <div class="content-header">
            <h2>Gallery</h2>
        </div>

        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-number" id="imageCount">—</div>
                <div class="stat-label">Total Images</div>
            </div>
        </div>

        <div id="gallery" class="gallery"></div>
        <div id="loading" class="loading">Loading images...</div>
    </main>

</div>

<!-- FLOATING UPLOAD BUTTON -->
<button class="fab" id="uploadBtn" title="Upload Image">
    <i class="fas fa-plus"></i>
</button>

<!-- UPLOAD MODAL -->
<div class="modal-overlay" id="uploadModal">
    <div class="modal">
        <div class="modal-header">
            <h2 class="modal-title">Upload Cosmic Image</h2>
            <button class="modal-close" onclick="closeUploadModal()">✕</button>
        </div>
        <div class="modal-content">
            <form action="/upload" method="POST" enctype="multipart/form-data" id="uploadForm">
                <div class="form-group">
                    <div class="file-input-wrapper" id="fileInputWrapper">
                        <label class="file-input-label">
                            <div class="file-input-icon">🖼️</div>
                            <div class="file-input-text">Click to upload or drag & drop</div>
                            <input type="file" name="image" accept="image/*" required id="imageInput">
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="caption">Caption (optional)</label>
                    <input type="text" name="caption" id="caption" placeholder="Describe your cosmic image...">
                </div>
                <button type="submit" class="upload-btn">Upload Image</button>
            </form>
        </div>
    </div>
</div>

<!-- COMMENTS MODAL -->
<div class="comments-modal-overlay" id="commentsModal">
    <div class="comments-modal">
        <div class="comments-modal-header">
            <h2 class="modal-title">Comments</h2>
            <button class="modal-close" onclick="closeCommentsModal()">✕</button>
        </div>
        <div class="comments-modal-search">
            <input 
                type="text" 
                id="comment-search" 
                placeholder="Search comments..." 
                onkeyup="searchComments()"
            >
        </div>
        <div class="comments-list" id="commentsList">
            <div class="empty-comments">Loading comments...</div>
        </div>
        <div class="comments-modal-footer">
            <input 
                type="text" 
                class="comments-input" 
                placeholder="Add a comment..." 
                id="comment-input"
                onkeydown="if(event.key==='Enter') submitComment()"
            >
            <button class="comments-submit" onclick="submitComment()">Post</button>
        </div>
    </div>
</div>

</div>

<script>

/* STARS */
const stars = document.getElementById("stars");
for(let i=0; i<150; i++){
    const star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random()*100 + "vw";
    star.style.top = Math.random()*100 + "vh";
    star.style.opacity = Math.random();
    star.style.animationDuration = (Math.random()*12 + 5) + "s";
    stars.appendChild(star);
}

/* THEME TOGGLE */
const toggleBtn = document.getElementById("themeToggle");
if(localStorage.getItem("theme") === "light"){
    document.body.classList.add("light-theme");
    toggleBtn.textContent = "☀️";
}
toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("light-theme");
    if(document.body.classList.contains("light-theme")){
        localStorage.setItem("theme", "light");
        toggleBtn.textContent = "☀️";
    } else {
        localStorage.setItem("theme", "dark");
        toggleBtn.textContent = "🌙";
    }
});

/* PROFILE */
fetch("/user")
.then(res => res.json())
.then(user => {
    if(!user) return;
    document.getElementById("profileCard").innerHTML = `
        <img class="profile-image" src="${user.photo}?sz=200" alt="Profile" referrerpolicy="no-referrer" onerror="this.src='/logo_1.png'">
        <div class="profile-name">${user.displayName}</div>
        <div class="profile-email">${user.email}</div>
    `;
});

/* IMAGE COUNT */
fetch("/image-count")
.then(res => res.json())
.then(data => {
    document.getElementById("imageCount").textContent = data.count || "0";
});

/* GALLERY */
let currentImageId = null;
let allComments = {};

fetch("/images")
.then(res => res.json())
.then(images => {
    const gallery = document.getElementById("gallery");
    const loading = document.getElementById("loading");
    
    loading.style.display = "none";
    
    if(images.length === 0){
        loading.style.display = "block";
        loading.innerText = "No images uploaded yet";
        return;
    }
    
    images.forEach(img => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <img src="${img.imageUrl}" loading="lazy">
            <div class="card-body">
                <div class="caption">${img.caption || "No caption"}</div>
                <div class="engagement-section">
                    <div class="engagement-left">
                        <div class="like-section">
                            <button class="like-btn" onclick="toggleLike('${img._id}', event)">♡</button>
                            <span class="like-count" id="like-count-${img._id}">0 likes</span>
                        </div>
                        <button class="comments-btn" onclick="openCommentsModal('${img._id}')">
                            💬 <span class="comment-badge" id="comment-count-${img._id}">0</span>
                        </button>
                    </div>
                    <button class="delete-btn" onclick="deleteImage('${img._id}')">Delete</button>
                </div>
            </div>
        `;
        gallery.appendChild(card);
        loadLikes(img._id);
        loadComments(img._id);
    });
})
.catch(() => {
    document.getElementById("loading").innerText = "Failed to load images";
});

/* UPLOAD */
document.getElementById("uploadBtn").addEventListener("click", () => {
    document.getElementById("uploadModal").classList.add("active");
});

function closeUploadModal(){
    document.getElementById("uploadModal").classList.remove("active");
    document.getElementById("uploadForm").reset();
}

document.getElementById("uploadModal").addEventListener("click", (e) => {
    if(e.target.id === "uploadModal") closeUploadModal();
});

/* LIKE */
async function toggleLike(imageId, event){
    try{
        const res = await fetch(`/api/images/${imageId}/like`, { method: "POST" });
        if(!res.ok) { alert("Please login to like"); return; }
        
        const data = await res.json();
        const btn = event.target;
        btn.classList.toggle("liked");
        btn.textContent = data.liked ? "❤" : "♡";
        document.getElementById(`like-count-${imageId}`).textContent = `${data.likeCount} ${data.likeCount === 1 ? "like" : "likes"}`;
    } catch(err){
        console.log(err);
    }
}

async function loadLikes(imageId){
    try{
        const res = await fetch(`/api/images/${imageId}/likes`);
        const data = await res.json();
        document.getElementById(`like-count-${imageId}`).textContent = `${data.likeCount} ${data.likeCount === 1 ? "like" : "likes"}`;
        if(data.userLiked){
            const btn = document.querySelector(`[onclick="toggleLike('${imageId}', event)"]`);
            if(btn) { btn.classList.add("liked"); btn.textContent = "❤"; }
        }
    } catch(err){ console.log(err); }
}

/* COMMENTS */
let currentModalImageId = null;

function openCommentsModal(imageId){
    currentModalImageId = imageId;
    document.getElementById("commentsModal").classList.add("active");
    loadCommentsModal(imageId);
}

function closeCommentsModal(){
    document.getElementById("commentsModal").classList.remove("active");
    currentModalImageId = null;
}

document.getElementById("commentsModal").addEventListener("click", (e) => {
    if(e.target.id === "commentsModal") closeCommentsModal();
});

document.addEventListener("keydown", (e) => {
    if(e.key === "Escape") closeCommentsModal();
});

async function loadCommentsModal(imageId){
    const list = document.getElementById("commentsList");
    try{
        const res = await fetch(`/api/images/${imageId}/comments`);
        const comments = await res.json();
        allComments[imageId] = comments;
        
        if(comments.length === 0){
            list.innerHTML = "<div class='empty-comments'>No comments yet. Be the first!</div>";
            return;
        }
        
        list.innerHTML = comments.map(c => `
            <div class="comment">
                <img class="comment-avatar" src="${c.userPhoto || '/logo_1.png'}" alt="avatar" onerror="this.src='/logo_1.png'">
                <div class="comment-content">
                    <div class="comment-header">
                        <span class="comment-name">${c.userName}</span>
                        <span class="comment-time">${getTimeAgo(new Date(c.createdAt))}</span>
                    </div>
                    <div class="comment-text">${c.commentText}</div>
                    <div class="comment-actions">
                        <button class="action-btn like" onclick="toggleCommentLike('${imageId}', '${c._id}', this)">
                            ${c.userLiked ? '❤' : '♡'} <span id="like-comment-${c._id}">${c.likeCount || 0}</span>
                        </button>
                    </div>
                </div>
            </div>
        `).join("");
    } catch(err){ console.log(err); }
}

function getTimeAgo(date){
    const now = new Date();
    const diff = now - date;
    const seconds = Math.floor(diff / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);
    
    if(seconds < 60) return "just now";
    if(minutes < 60) return `${minutes}m ago`;
    if(hours < 24) return `${hours}h ago`;
    if(days < 7) return `${days}d ago`;
    return date.toLocaleDateString();
}

async function submitComment(){
    const input = document.getElementById("comment-input");
    const text = input.value.trim();
    
    if(!text || !currentModalImageId) return;
    
    try{
        const res = await fetch(`/api/images/${currentModalImageId}/comment`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ commentText: text })
        });
        
        if(!res.ok) { alert("Error posting comment"); return; }
        input.value = "";
        loadCommentsModal(currentModalImageId);
        loadComments(currentModalImageId);
    } catch(err){ console.log(err); }
}

async function toggleCommentLike(imageId, commentId, btn){
    try{
        const res = await fetch(`/api/images/${imageId}/comment/${commentId}/like`, { method: "POST" });
        if(!res.ok) return;
        
        const data = await res.json();
        btn.className = data.liked ? "action-btn like liked" : "action-btn like";
        document.getElementById(`like-comment-${commentId}`).textContent = data.likeCount;
    } catch(err){ console.log(err); }
}

async function loadComments(imageId){
    try{
        const res = await fetch(`/api/images/${imageId}/comments`);
        const comments = await res.json();
        const badge = document.getElementById(`comment-count-${imageId}`);
        if(badge) badge.textContent = comments.length;
    } catch(err){ console.log(err); }
}

function searchComments(){
    const term = document.getElementById("comment-search").value.toLowerCase();
    const comments = allComments[currentModalImageId] || [];
    
    if(!term){
        loadCommentsModal(currentModalImageId);
        return;
    }
    
    const filtered = comments.filter(c => 
        c.commentText.toLowerCase().includes(term) || c.userName.toLowerCase().includes(term)
    );
    
    const list = document.getElementById("commentsList");
    list.innerHTML = filtered.map(c => `
        <div class="comment">
            <img class="comment-avatar" src="${c.userPhoto || '/logo_1.png'}" alt="avatar" onerror="this.src='/logo_1.png'">
            <div class="comment-content">
                <div class="comment-header">
                    <span class="comment-name">${c.userName}</span>
                    <span class="comment-time">${getTimeAgo(new Date(c.createdAt))}</span>
                </div>
                <div class="comment-text">${c.commentText}</div>
            </div>
        </div>
    `).join("");
}

async function deleteImage(id){
    if(!confirm("Delete this image?")) return;
    
    try{
        const res = await fetch(`/images/${id}`, { method: "DELETE" });
        const data = await res.json();
        if(data.success) { alert("Image deleted"); location.reload(); }
        else alert(data.message || "Delete failed");
    } catch(err){ console.log(err); }
}

</script>
